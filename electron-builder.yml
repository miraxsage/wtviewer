appId: com.wtviewer.app
productName: WTViewer

directories:
  output: dist-electron

asar: true

files:
  - electron/dist/**/*
  - .next/**/*
  - "!.next/cache/**/*"
  - src/**/*
  - public/**/*
  - next.config.ts
  - package.json

asarUnpack:
  - "**/*.node"
  - node_modules/node-unrar-js/dist/**/*
  - node_modules/better-sqlite3/**/*
  - .next/**/*

mac:
  target: dmg
  icon: public/icon.icns

win:
  target: nsis
  icon: public/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
