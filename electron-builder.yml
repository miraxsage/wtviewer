appId: com.wtviewer.app
productName: WTViewer

directories:
  output: dist-electron

compression: maximum
electronLanguages: ["en", "ru"]

asar: true

files:
  - electron/dist/**/*
  - package.json
  - "!node_modules/**/*"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!node_modules/**"
      - "!**/*.map"
      - "!**/*.d.ts"
  - from: .next/standalone/node_modules
    to: standalone/node_modules
    filter:
      - "**/*"
      - "!**/*.map"
      - "!**/*.d.ts"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
      - "!**/*.map"
  - from: public
    to: standalone/public

mac:
  target: dmg
  icon: public/icon.icns

win:
  target: nsis
  icon: public/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
